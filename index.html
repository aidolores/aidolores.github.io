<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food + Dolores AI</title>

  <!-- Food Ultra CSS -->
  <link rel="stylesheet" href="food.css">

  <!-- Optional: base styles for page -->
  <style>
    body { font-family: Arial, sans-serif; background: #1e1e1e; color: #f0f0f0; margin: 0; padding: 0; }
    #app { padding: 20px; max-width: 1200px; margin: auto; }
    input, button { font-size: 1rem; padding: 0.5rem; margin: 0.2rem; }
    #output { margin-top: 20px; white-space: pre-wrap; }
    .file-card { background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .file-card img { max-width: 100%; }
  </style>
</head>
<body>

  <div id="app">
    <h1>Dolores AI</h1>

    <!-- User input -->
    <input type="text" id="userInput" placeholder="Ask Dolores something..." size="50">
    <button id="sendBtn">Send</button>

    <!-- Output area -->
    <div id="output"></div>
  </div>

  <!-- JSON files (optional preload) -->
  <script type="application/json" id="functionsJSON">
    <!-- content of functions.json -->
  </script>
  <script type="application/json" id="smartJSON">
    <!-- content of smart.json -->
  </script>
  <script type="application/json" id="templatesJSON">
    <!-- content of templates.json -->
  </script>

  <!-- JS Engines -->
  <script src="food.js"></script>
  <script src="image-engine.js"></script>
  <script src="dolores-engine.js"></script>

  <!-- Integration script -->
  <script>
    // Output helper
    const outputEl = document.getElementById('output');
    function renderFileCard({ name, content }) {
      const card = document.createElement('div');
      card.className = 'file-card';
      if (name.endsWith('.png') || name.endsWith('.jpg') || name.endsWith('.jpeg')) {
        const img = document.createElement('img');
        img.src = content;
        card.appendChild(img);
      } else {
        card.textContent = content;
      }
      outputEl.appendChild(card);
    }

    // Load JSON knowledge/templates
    let knowledgeBase = {};
    let templates = {};
    fetch('smart.json').then(r => r.json()).then(kb => knowledgeBase = kb);
    fetch('templates.json').then(r => r.json()).then(temp => templates = temp);

    // Handle user input
    document.getElementById('sendBtn').addEventListener('click', () => {
      const input = document.getElementById('userInput').value;
      document.getElementById('userInput').value = '';

      // Call Dolores engine
      const response = Dolores.respond(input, knowledgeBase, templates);

      // Handle image generation
      if (response.type === 'image') {
        const imgUrl = ImageEngine.generate(response.prompt);
        renderFileCard({ name: 'image.png', content: imgUrl });
      }
      // Handle Food rendering
      else if (response.type === 'food') {
        const htmlContent = Food.render(response.prompt);
        renderFileCard({ name: 'food.html', content: htmlContent });
      }
      // Text response
      else {
        renderFileCard({ name: 'text.txt', content: response.text });
      }
    });
  </script>
</body>
</html>
